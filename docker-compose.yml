services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      target: dev
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - ./:/usr/src/app:cached
      - /usr/src/app/node_modules
    command: pnpm run start:dev

  worker:
    build:
      context: .
      target: dev
    command: pnpm run start:dev
    depends_on:
      - redis
    environment:
      - NODE_ENV=development
      - WORKER=true
    deploy:
      replicas: 2
    volumes:
      - ./:/usr/src/app:cached
      - /usr/src/app/node_modules

volumes:
  redis-data: {}
