# Central configuration (human-friendly).
# Override any value with environment variables documented next to each key.

server:
  # ENV: NODE_ENV
  nodeEnv: development
  # ENV: PORT
  port: 3000

redis:
  # Full connection URL (ENV: REDIS_URL). If set, it takes precedence.
  url: redis://redis:6379
  # ENV: REDIS_HOST
  host: redis
  # ENV: REDIS_PORT
  port: 6379
  # ENV: REDIS_PASSWORD
  password: ""

database:
  # Database client for archive persistence (ENV: DATABASE_CLIENT)
  # Allowed: postgres
  client: postgres
  # ENV: DATABASE_HOST
  host: postgres
  # ENV: DATABASE_PORT
  port: 5432
  # ENV: DATABASE_USER
  user: postgres
  # ENV: DATABASE_PASSWORD
  password: postgres
  # ENV: DATABASE_DB
  db: video_creator

worker:
  # ENV: WORKER_CONCURRENCY
  concurrency: 2
  # ENV: BULL_QUEUE_PREFIX
  queuePrefix: ""

download:
  # Where download artifacts and manifests are stored (ENV: DATA_DIR)
  dataDir: /usr/src/app/data
  # Where final output videos are stored (ENV: RESULT_DIR)
  resultDir: /usr/src/app/video-result
  # Size per part when splitting (in megabytes). Default: 8 (ENV: PART_SIZE_BYTES)
  # Note: application should interpret this value as MB and convert to bytes.
  partSizeBytes: 16
  # Default download strategy when automatic detection is ambiguous.
  # Allowed: auto | dash-single | dash-segmented | dash-byte-range | durl-byte-range
  # ENV: DOWNLOAD_DEFAULT_STRATEGY
  defaultStrategy: auto
  # Per-process cap for parallel strategies:
  # - dash-segmented
  # - durl-byte-range
  # ENV: PARALLEL_MAX_CONCURRENT_DOWNLOADS
  parallelMaxConcurrentDownloads: 10
  # Per-process cap for single-download strategies:
  # - dash-single
  # - durl single file
  # ENV: SINGLE_MAX_CONCURRENT_DOWNLOADS
  singleMaxConcurrentDownloads: 5
  # Global cap across all worker replicas/processes for parallel strategies:
  # - dash-segmented
  # - durl-byte-range
  # Set 0 to disable this limiter. (ENV: GLOBAL_PARALLEL_MAX_CONCURRENT_DOWNLOADS)
  globalParallelMaxConcurrentDownloads: 10
  # Global cap across all worker replicas/processes for single-download strategies:
  # - dash-single
  # - durl single file
  # Set 0 to disable this limiter. (ENV: GLOBAL_SINGLE_MAX_CONCURRENT_DOWNLOADS)
  globalSingleMaxConcurrentDownloads: 5
  # Lease duration for global limiter permits in milliseconds.
  # Expired permits are reclaimed automatically. (ENV: GLOBAL_LIMITER_LEASE_MS)
  globalLimiterLeaseMs: 120000
  # Wait interval before retrying global permit acquire in milliseconds.
  # (ENV: GLOBAL_LIMITER_WAIT_MS)
  globalLimiterWaitMs: 300
  # Retry attempts for transient failures (ENV: DOWNLOAD_RETRY_COUNT)
  retryCount: 3
  # Toggle resumable downloads on/off (ENV: RESUME_DOWNLOAD_ENABLED)
  resumeEnabled: true
  # Preferred video quality across all sources.
  # Allowed: 2160p, 1440p, 1080p, 720p, 480p, 360p
  # Selection policy:
  # - Try preferred quality first
  # - If unavailable, fallback to lower quality
  # - Minimum fallback is 720p, except when preferred is 480p or 360p
  preferVideoQuality: 1080p

ffmpeg:
  # Path to ffmpeg binary or package-provided executable (ENV: FFMPEG_PATH)
  path: ffmpeg
  # Timeout (seconds) allowed for merge operations (ENV: FFMPEG_MERGE_TIMEOUT_SEC)
  mergeTimeoutSec: 300

proxy:
  # ENV: HTTP_PROXY
  http: ""
  # ENV: HTTPS_PROXY
  https: ""

logging:
  # ENV: LOG_LEVEL (e.g. debug, info, warn, error)
  level: debug
  rotate:
    # Enable/disable log rotation (ENV: LOG_ROTATE_ENABLED)
    enabled: true
    # Rotate when any managed log file reaches this size in MB (ENV: LOG_ROTATE_MAX_FILE_SIZE_MB)
    maxFileSizeMb: 5
    # Minimum interval between rotate checks in milliseconds (ENV: LOG_ROTATE_CHECK_INTERVAL_MS)
    checkIntervalMs: 5000
    # Archive destination: local | s3 (ENV: LOG_ROTATE_DESTINATION)
    destination: local
    local:
      # Local archive retention by max number of zip files (ENV: LOG_ROTATE_LOCAL_MAX_FILES)
      maxFiles: 10
      # Optional retention by days; 0 means disabled (ENV: LOG_ROTATE_LOCAL_RETENTION_DAYS)
      retentionDays: 0
    s3:
      # Required when destination=s3 (ENV: LOG_ROTATE_S3_BUCKET)
      bucket: ""
      # ENV: LOG_ROTATE_S3_REGION
      region: ap-southeast-1
      # ENV: LOG_ROTATE_S3_PREFIX
      prefix: logs/archived
      # Optional custom endpoint for S3-compatible services (ENV: LOG_ROTATE_S3_ENDPOINT)
      endpoint: ""
      # ENV: LOG_ROTATE_S3_FORCE_PATH_STYLE
      forcePathStyle: false
      # Optional static credentials. If empty, SDK default credential chain is used.
      # ENV: LOG_ROTATE_S3_ACCESS_KEY_ID
      accessKeyId: ""
      # ENV: LOG_ROTATE_S3_SECRET_ACCESS_KEY
      secretAccessKey: ""
      # ENV: LOG_ROTATE_S3_SESSION_TOKEN
      sessionToken: ""
      # Default retention for S3 archives in days (ENV: LOG_ROTATE_S3_RETENTION_DAYS)
      retentionDays: 30

app:
  # Interval (ms) for Bull stalled-check housekeeping (ENV: BULL_STALLED_CHECK_INTERVAL_MS)
  bullStalledCheckIntervalMs: 30000

archive:
  # Enable terminal-job archival to Postgres (ENV: ARCHIVE_ENABLED)
  enabled: true
  # Optional explicit run id for archive key namespace.
  # Default: auto-generated/shared via Redis key job:archive:run-id (ENV: ARCHIVE_RUN_ID)
  runId: ""
  # Run a terminal-job sweep shortly after startup (ENV: ARCHIVE_SWEEP_ON_STARTUP)
  sweepOnStartup: true
  # Run periodic terminal-job sweeps in seconds (ENV: ARCHIVE_SWEEP_INTERVAL_SEC)
  sweepIntervalSec: 60
  # Max number of master jobs to sweep per pass (ENV: ARCHIVE_BATCH_SIZE)
  batchSize: 50
  # Distributed lock TTL for per-master archive execution in milliseconds
  # (ENV: ARCHIVE_JOB_LOCK_MS)
  jobLockMs: 120000
  # Distributed lock TTL for sweep leader election in milliseconds
  # (ENV: ARCHIVE_SWEEP_LOCK_MS)
  sweepLockMs: 55000
